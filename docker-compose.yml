# Compose file lives at the repository root (paths below are relative to this directory).
#
# Prod profile: the `gateway` service is the main entry (HTTP NGINX_PORT defaults to 80; HTTPS 443).
# It proxies / to the static frontend, /life-manager/api to the life-manager v1 API, and /api to
# health/version endpoints. The prod frontend build defaults to an empty EXPO_PUBLIC_API_BASE_URL
# so the browser uses same-origin /life-manager/api paths. Override
# with a full origin if you must talk to the API on another host (non-gateway devices, etc.).
#
# Dev (frontend_dev) defaults EXPO_PUBLIC_API_BASE_URL to http://localhost:3000 for direct backend access.
#
# Deploy checklist (API path changes): rebuild and pull BOTH backend and frontend ECR images — API
# paths are baked into the static frontend bundle at build time. A backend-only CI deploy is not
# sufficient for prod to work end-to-end.

name: life-manager

services:
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "${OLLAMA_PORT}:${OLLAMA_PORT}"
  #   volumes:
  #     - ollama:/root/.ollama
  #     - ./backend/ollama-entrypoint.sh:/entrypoint.sh
  #   entrypoint: ["/entrypoint.sh"]
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0
  #     - "OLLAMA_PORT=${OLLAMA_PORT}"
  #   restart: unless-stopped
  #   profiles: ["dev", "prod"]

  life-manager:
    image: ${LIFE_MANAGER_BACKEND_IMAGE}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: life_manager_app
    env_file:
      - ${ENV_FILE}
    environment:
      APP_PORT: ${APP_PORT}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./backend/data:/app/data
    restart: on-failure
    profiles: ["prod"]

  frontend:
    image: ${LIFE_MANAGER_FRONTEND_IMAGE}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-}
    container_name: life_manager_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      # Same host path as gateway: if ACME hits the frontend (e.g. old gateway image), tokens exist and are not served as SPA index.html.
      - ./nginx/certbot/webroot:/var/www/certbot:ro
    restart: on-failure
    profiles: ["prod"]

  gateway:
    image: ${LIFE_MANAGER_GATEWAY_IMAGE}
    build:
      context: ./nginx
      dockerfile: gateway.Dockerfile
    container_name: life_manager_gateway
    profiles: ["prod"]
    env_file:
      - ${ENV_FILE}
    environment:
      # Only substitute ${APP_PORT} in templates; leave nginx variables like $host intact.
      NGINX_ENVSUBST_FILTER: "^APP_PORT$"
    ports:
      - "${NGINX_PORT:-80}:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Writable so the gateway entrypoint can create localhost.crt/key when missing (see nginx/docker-entrypoint.d).
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/certbot/webroot:/var/www/certbot
      # Pick up nginx template edits without rebuilding the gateway image.
      - ./nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - life-manager
      - frontend
    restart: on-failure

  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: life_manager_frontend_dev
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:3000}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-8080}:${FRONTEND_PORT:-8080}"
    restart: on-failure
    profiles: ["dev"]

  # OCR sidecar — not started with dev/test/prod alone; use e.g.
  # docker compose --profile prod --profile tesseract up -d
  tesseract:
    image: ${TESSERACT_SERVER_IMAGE:-hertzg/tesseract-server:latest}
    container_name: tesseract
    ports:
      - "${TESSERACT_PORT}:${TESSERACT_PORT}"
    environment:
      - TESSERACT_LANGUAGE=eng
    restart: unless-stopped
    profiles: ["tesseract"]

volumes:
  ollama:

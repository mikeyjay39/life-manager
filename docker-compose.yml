# Compose file lives at the repository root (paths below are relative to this directory).
#
# Prod profile: the `gateway` service is the main entry (default host port from NGINX_PORT, 80).
# It proxies / to the static frontend and /api to the life-manager backend. Set
# EXPO_PUBLIC_API_BASE_URL to that same origin (default http://localhost). If NGINX_PORT is not
# 80, set EXPO_PUBLIC_API_BASE_URL to http://localhost:<NGINX_PORT> for the prod frontend build.
# Dev (frontend_dev) and direct backend access may still use http://localhost:3000 or a LAN IP.
#
# Set EXPO_PUBLIC_API_BASE_URL to the API origin the browser can reach (scheme + host + port).
# Default fallbacks use plain HTTP on localhost. Override in backend/.prod.env, backend/.dev.env,
# or the environment before running compose if your API is elsewhere or behind HTTPS.

name: life-manager

services:
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "${OLLAMA_PORT}:${OLLAMA_PORT}"
  #   volumes:
  #     - ollama:/root/.ollama
  #     - ./backend/ollama-entrypoint.sh:/entrypoint.sh
  #   entrypoint: ["/entrypoint.sh"]
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0
  #     - "OLLAMA_PORT=${OLLAMA_PORT}"
  #   restart: unless-stopped
  #   profiles: ["dev", "prod"]

  life-manager:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: life_manager_app
    env_file:
      - ${ENV_FILE}
    environment:
      APP_PORT: ${APP_PORT}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./backend/data:/app/data
    restart: on-failure
    profiles: ["prod"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost}
    container_name: life_manager_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: on-failure
    profiles: ["prod"]

  gateway:
    build:
      context: ./nginx
      dockerfile: gateway.Dockerfile
    image: life-manager-gateway:latest
    container_name: life_manager_gateway
    profiles: ["prod"]
    env_file:
      - ${ENV_FILE}
    environment:
      # Only substitute ${APP_PORT} in templates; leave nginx variables like $host intact.
      NGINX_ENVSUBST_FILTER: "^APP_PORT$"
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - life-manager
      - frontend
    restart: on-failure

  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: life_manager_frontend_dev
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_DEV_PORT:-8081}:8081"
    restart: on-failure
    profiles: ["dev"]

  tesseract:
    image: hertzg/tesseract-server:latest
    container_name: tesseract
    ports:
      - "${TESSERACT_PORT}:${TESSERACT_PORT}"
    environment:
      - TESSERACT_LANGUAGE=eng
    restart: unless-stopped
    profiles: ["test", "dev", "prod"]

volumes:
  ollama:

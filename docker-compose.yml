# Compose file lives at the repository root (paths below are relative to this directory).
#
# Prod profile: the `gateway` service is the main entry (HTTP NGINX_PORT defaults to 80; HTTPS 443).
# It proxies / to the static frontend, /life-manager/api to the life-manager v1 API, /api to
# health/version endpoints, and /logs/ to Grafana. The prod frontend build defaults to an empty EXPO_PUBLIC_API_BASE_URL
# so the browser uses same-origin /life-manager/api paths. Override
# with a full origin if you must talk to the API on another host (non-gateway devices, etc.).
#
# Dev (frontend_dev) defaults EXPO_PUBLIC_API_BASE_URL to http://localhost:3000 for direct backend access.
# docker-dev profile: life_manager_dev (cargo run + source mount) and frontend_dev in Docker; uses .dev.env.
#
# Deploy checklist (API path changes): API paths are baked into the static frontend bundle at
# build time, so prod needs matching backend and frontend images. On merge to main, CI rebuilds
# and pushes only changed prod images (backend/, frontend/, nginx/) to ECR; Lightsail always pulls
# :latest for the full stack via scripts/deploy-prod-lightsail.sh.

name: life-manager

x-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://127.0.0.1:${LOKI_PORT:-3100}/loki/api/v1/push"
    loki-retries: "5"
    loki-batch-size: "400"
    mode: non-blocking
    max-buffer-size: 4m
    loki-external-labels: "compose_project=life-manager,compose_service={{.Name}}"

services:
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "${OLLAMA_PORT}:${OLLAMA_PORT}"
  #   volumes:
  #     - ollama:/root/.ollama
  #     - ./backend/ollama-entrypoint.sh:/entrypoint.sh
  #   entrypoint: ["/entrypoint.sh"]
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0
  #     - "OLLAMA_PORT=${OLLAMA_PORT}"
  #   restart: unless-stopped
  #   profiles: ["dev", "prod"]

  life-manager:
    image: ${LIFE_MANAGER_BACKEND_IMAGE}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: life_manager_app
    env_file:
      - ${ENV_FILE}
    environment:
      APP_PORT: ${APP_PORT}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./backend/data:/app/data
    restart: on-failure
    logging: *loki-logging
    profiles: ["prod"]

  life_manager_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: life_manager_dev
    env_file:
      - ${ENV_FILE}
    environment:
      APP_PORT: ${APP_PORT}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      # Compile cache only; source comes from the development image (see backend/Dockerfile).
      - life_manager_dev_target:/app/target
      - ./backend/data:/app/data
    restart: on-failure
    logging: *loki-logging
    profiles: ["docker-dev"]

  frontend:
    image: ${LIFE_MANAGER_FRONTEND_IMAGE}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-}
    container_name: life_manager_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      # Same host path as gateway: if ACME hits the frontend (e.g. old gateway image), tokens exist and are not served as SPA index.html.
      - ./nginx/certbot/webroot:/var/www/certbot:ro
    restart: on-failure
    logging: *loki-logging
    profiles: ["prod"]

  gateway:
    image: ${LIFE_MANAGER_GATEWAY_IMAGE}
    build:
      context: ./nginx
      dockerfile: gateway.Dockerfile
    container_name: life_manager_gateway
    profiles: ["prod"]
    env_file:
      - ${ENV_FILE}
    environment:
      # Only substitute ${APP_PORT} in templates; leave nginx variables like $host intact.
      NGINX_ENVSUBST_FILTER: "^APP_PORT$"
    ports:
      - "${NGINX_PORT:-80}:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Writable so the gateway entrypoint can create localhost.crt/key when missing (see nginx/docker-entrypoint.d).
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/certbot/webroot:/var/www/certbot
      # Pick up nginx template edits without rebuilding the gateway image.
      - ./nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - life-manager
      - frontend
      - grafana
    restart: on-failure
    logging: *loki-logging

  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: life_manager_frontend_dev
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:3000}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-8080}:${FRONTEND_PORT:-8080}"
    volumes:
      # Preserve image-built node_modules; source comes from the development image.
      - frontend_dev_node_modules:/app/node_modules
    restart: on-failure
    logging: *loki-logging
    profiles: ["dev", "docker-dev"]

  # OCR sidecar — not started with dev/test/prod alone; use e.g.
  # docker compose --profile prod --profile tesseract up -d
  tesseract:
    image: ${TESSERACT_SERVER_IMAGE:-hertzg/tesseract-server:latest}
    container_name: tesseract
    ports:
      - "${TESSERACT_PORT}:${TESSERACT_PORT}"
    environment:
      - TESSERACT_LANGUAGE=eng
    restart: unless-stopped
    logging: *loki-logging
    profiles: ["tesseract"]

  loki:
    build:
      context: ./observability/loki
      dockerfile: Dockerfile
    image: life-manager-loki:local
    container_name: life_manager_loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    volumes:
      - loki_data:/loki
    restart: on-failure
    profiles: ["prod", "docker-dev"]

  grafana:
    build:
      context: ./observability/grafana
      dockerfile: Dockerfile
    image: life-manager-grafana:local
    container_name: life_manager_grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/container-logs.json
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GRAFANA_SERVE_FROM_SUB_PATH:-false}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    restart: on-failure
    profiles: ["prod", "docker-dev"]

volumes:
  ollama:
  frontend_dev_node_modules:
  life_manager_dev_target:
  loki_data:
  grafana_data:

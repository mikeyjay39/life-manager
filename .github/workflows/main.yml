name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend unit tests (Vitest)
        run: npm run test:run
        working-directory: frontend

  backend-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Write build revision
        run: ./backend/scripts/write_rev.sh

      - name: Run Unit Tests
        run: cargo test --lib --workspace --manifest-path backend/Cargo.toml
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Write build revision
        run: ./backend/scripts/write_rev.sh

      - name: Run Integration Tests
        run: cd backend && cargo test --test '*'

  deploy-prod-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-unit-tests, backend-unit-tests, integration-tests]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-west-2
      ECR_REGISTRY: 089366939950.dkr.ecr.us-west-2.amazonaws.com
      BACKEND_REPO: life-manager-backend
      FRONTEND_REPO: life-manager-frontend
      GATEWAY_REPO: life-manager-gateway
      ALLOY_REPO: alloy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed image paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            gateway:
              - 'nginx/**'
            alloy:
              - 'observability/**'

      - name: Write build revision
        if: steps.changes.outputs.backend == 'true'
        run: ./backend/scripts/write_rev.sh

      - name: Configure AWS credentials
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.frontend == 'true' || steps.changes.outputs.gateway == 'true' || steps.changes.outputs.alloy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.frontend == 'true' || steps.changes.outputs.gateway == 'true' || steps.changes.outputs.alloy == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        if: steps.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ github.sha }}

      - name: Build and push frontend image
        if: steps.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}

      - name: Build and push gateway image
        if: steps.changes.outputs.gateway == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/gateway.Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.GATEWAY_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.GATEWAY_REPO }}:${{ github.sha }}

      - name: Build and push alloy image
        if: steps.changes.outputs.alloy == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./observability
          file: ./observability/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ALLOY_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ALLOY_REPO }}:${{ github.sha }}

  deploy-prod-lightsail:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-prod-images
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-west-2
      ECR_REGISTRY: 089366939950.dkr.ecr.us-west-2.amazonaws.com
      DEPLOY_PATH: /home/ec2-user/life-manager
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR login password
        id: ecr-password
        run: echo "password=$(aws ecr get-login-password --region "${AWS_REGION}")" >> "$GITHUB_OUTPUT"

      - name: Deploy prod stack on Lightsail
        uses: appleboy/ssh-action@v1.2.0
        env:
          ECR_PASSWORD: ${{ steps.ecr-password.outputs.password }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          GITHUB_SHA: ${{ env.GITHUB_SHA }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          port: 22
          envs: ECR_PASSWORD,ECR_REGISTRY,DEPLOY_PATH,GITHUB_SHA
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            git pull origin main
            bash scripts/deploy-prod-lightsail.sh

